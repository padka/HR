name: Branch Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to false to delete eligible merged remote branches"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete eligible merged branches
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'true' || inputs.dry_run }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch origin main --prune
          git fetch origin "+refs/heads/*:refs/remotes/origin/*" --prune

          open_pr_branches="$(mktemp)"
          gh pr list --repo "$REPO" --state open --limit 1000 --json headRefName --jq '.[].headRefName' \
            | sort -u > "$open_pr_branches"

          candidates="$(mktemp)"
          git branch -r --merged origin/main \
            | sed 's/^[[:space:]]*//' \
            | sed 's#^origin/##' \
            | grep -v '^HEAD -> ' \
            | sort -u > "$candidates"

          echo "dry_run=$DRY_RUN"
          while IFS= read -r branch; do
            [ -n "$branch" ] || continue

            case "$branch" in
              main|release/*|rc/*|codex/*|hotfix/*)
                echo "skip protected-name $branch"
                continue
                ;;
              fix/*|feature/*|chore/*|ci/*|bugfix/*)
                ;;
              *)
                echo "skip unsupported-prefix $branch"
                continue
                ;;
            esac

            if grep -Fxq "$branch" "$open_pr_branches"; then
              echo "skip open-pr $branch"
              continue
            fi

            encoded_branch="$(python -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$branch")"
            protected="$(gh api "repos/$REPO/branches/$encoded_branch" --jq '.protected' 2>/dev/null || echo true)"
            if [ "$protected" = "true" ]; then
              echo "skip github-protected $branch"
              continue
            fi

            if [ "$DRY_RUN" != "false" ]; then
              echo "dry-run delete origin/$branch"
              continue
            fi

            echo "delete origin/$branch"
            git push origin --delete "$branch"
          done < "$candidates"
