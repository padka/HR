name: CI

on:
  push:
    branches: ["main", "release/**"]
    tags: ["rc/**", "v*"]
  pull_request:

jobs:
  build:
    name: build (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recruitsmart
          POSTGRES_PASSWORD: recruitsmart
          POSTGRES_DB: rs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recruitsmart -d rs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Codex system document present
        run: test -f ./.codex/system.md

      - name: Secret scan
        run: ./scripts/secret_scan.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q backend scripts tests

      - name: Ruff critical gate
        run: |
          base_ref="origin/main"
          if ! git rev-parse --verify "${base_ref}" >/dev/null 2>&1; then
            git fetch origin main --depth=1
          fi
          git diff --name-only "${base_ref}...HEAD" -- '*.py' \
            | grep -v '^backend/apps/bot/services/notification_flow.py$' \
            | grep -v '^backend/apps/bot/services/slot_flow.py$' \
            | grep -v '^backend/apps/bot/services/onboarding_flow.py$' \
            | grep -v '^backend/apps/bot/services/broadcast.py$' \
            | grep -v '^backend/apps/bot/services/test1_flow.py$' \
            | grep -v '^backend/apps/bot/services/test2_flow.py$' \
            > /tmp/ruff-critical-files.txt || true
          if [ -s /tmp/ruff-critical-files.txt ]; then
            xargs ruff check --select F,E9 --output-format=concise < /tmp/ruff-critical-files.txt
          else
            echo "No Python files outside the documented ruff baseline."
          fi

      - name: Install npm dependencies
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm ci

      - name: Build UI bundle for backend shell tests
        if: matrix.python-version != '3.12'
        working-directory: frontend/app
        run: npm ci && npm run build

      - name: Frontend typecheck
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run typecheck

      - name: Frontend lint
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run lint

      - name: Frontend unit tests
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run test

      - name: Build and verify UI bundle
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run build:verify

      - name: Install Playwright browsers
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npx playwright install --with-deps

      - name: Run Playwright smoke tests
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        env:
          PYTHON_BIN: python
        run: npx playwright test tests/e2e/smoke.spec.ts tests/e2e/mobile-smoke.spec.ts

      - name: Check active build references
        if: matrix.python-version == '3.12'
        run: |
          ! rg -n 'Build Tailwind bundle|frontend/app/src/theme/tokens\.ts|testing \(интеграционная\)|feature/\*' \
            README.md docs/TECH_STRATEGY.md docs/TECHNICAL_OVERVIEW.md

      - name: Check OpenAPI drift
        if: matrix.python-version == '3.12'
        run: make openapi-check PYTHON=python

      - name: Run contour preflight
        if: matrix.python-version == '3.12'
        env:
          ENVIRONMENT: test
          RECRUITSMART_OPENAPI_MODE: "1"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          RUN_MIGRATIONS: "false"
          AUTO_MIGRATE: "false"
          BOT_AUTOSTART: "false"
        run: |
          python scripts/contour_preflight.py --contour maxpilot --root .
          python scripts/contour_preflight.py --contour admin --root .

      - name: Run release targeted tests
        if: github.event_name != 'push' || github.ref == 'refs/heads/main'
        env:
          ENVIRONMENT: test
        run: >
          pytest -q
          tests/test_max_webhook_api.py
          tests/test_max_candidate_chat.py
          tests/test_max_idempotency.py
          tests/test_max_delivery_recovery.py
          tests/test_admin_candidate_chat_actions.py
          tests/test_admin_max_runtime_surfaces.py
          tests/test_state_store.py
          tests/test_cache_integration.py
          tests/test_dependency_injection.py

      - name: Run PostgreSQL proof
        if: matrix.python-version == '3.12' && (github.event_name != 'push' || github.ref == 'refs/heads/main')
        run: make test-postgres-proof PYTHON=python

      - name: Run backend config smoke tests
        if: matrix.python-version == '3.12'
        run: pytest -q tests/test_prod_config_simple.py tests/test_session_cookie_config.py tests/test_admin_state_nullbot.py

      - name: Run tests
        env:
          ENVIRONMENT: test
          BACKEND_TEST_TIMEOUT_SECONDS: "1800"
        run: >
          python scripts/ci_pytest.py
          --timeout-seconds "${BACKEND_TEST_TIMEOUT_SECONDS}"
          --
          -q
          --maxfail=1
          --cov=backend
          --cov=tests
          --cov-report=xml
          --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Ensure no merge conflict markers remain
        run: |
          if rg -n -e '^<<<<<<< ' -e '^>>>>>> ' -e '^=======$'; then
            exit 1
          fi
