name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: build (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Codex system document present
        run: test -f ./.codex/system.md

      - name: Secret scan
        run: ./scripts/secret_scan.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node.js
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install npm dependencies
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm ci

      - name: Frontend typecheck
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run typecheck

      - name: Frontend lint
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run lint

      - name: Frontend unit tests
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run test

      - name: Build and verify UI bundle
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npm run build:verify

      - name: Install Playwright browsers
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        run: npx playwright install --with-deps

      - name: Run Playwright smoke tests
        if: matrix.python-version == '3.12'
        working-directory: frontend/app
        env:
          PYTHON_BIN: python
        run: npx playwright test tests/e2e/smoke.spec.ts tests/e2e/mobile-smoke.spec.ts

      - name: Check active build references
        if: matrix.python-version == '3.12'
        run: |
          ! rg -n 'Build Tailwind bundle|frontend/app/src/theme/tokens\.ts|testing \(интеграционная\)|feature/\*' \
            README.md docs/TECH_STRATEGY.md docs/TECHNICAL_OVERVIEW.md

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run backend config smoke tests
        if: matrix.python-version == '3.12'
        run: pytest -q tests/test_prod_config_simple.py tests/test_session_cookie_config.py tests/test_admin_state_nullbot.py

      - name: Run tests
        run: pytest --cov=backend --cov=tests --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Ensure no merge conflict markers remain
        run: |
          if rg -n -e '^<<<<<<< ' -e '^>>>>>> ' -e '^=======$'; then
            exit 1
          fi
